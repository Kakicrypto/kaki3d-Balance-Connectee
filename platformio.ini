; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
lib_ldf_mode = deep+
lib_deps = 
	bodmer/TFT_eSPI
	adafruit/Adafruit PN532@^1.3.4
	bogde/HX711@^0.7.5
	adafruit/Adafruit BusIO@^1.17.4
